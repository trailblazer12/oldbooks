<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的订单 · BookPass</title>
<link rel="stylesheet" type="text/css" href="style.css">
<style>
.order-list {
  padding: 0 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  padding-bottom: 100px;
}

.order-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 16px;
  display: flex;
  gap: 14px;
  box-shadow: var(--shadow);
}

.order-status {
  font-size: 12px;
  padding: 4px 8px;
  border-radius: 6px;
  font-weight: 600;
}
.status-pending {
  background: #FFF8E1;
  color: #FFC107;
}
.status-finished {
  background: #E8F5E9;
  color: #4CAF50;
}
.status-canceled {
  background: #FFEBEE;
  color: #F44336;
}

.order-meta {
  font-size: 12px;
  color: var(--gray);
  margin-top: 8px;
  line-height: 1.5;
}
</style>
</head>
<body>

<div class="app">
  <!-- 订单页面 -->
  <div class="page active" id="page-orders">
    <div class="navbar">
      <button class="nav-back" onclick="window.location.href='index.html'">
        <img src="documents/返回.png" style="border-radius: 50%;width: 90%;height: 90%;">
      </button>
      <div class="nav-title">我的订单</div>
    </div>

    <!-- 订单状态筛选栏 -->
    <div class="filter-bar">
      <div class="filter-chip active" onclick="applyOrderFilter(this, 'all')">全部订单</div>
      <div class="filter-chip" onclick="applyOrderFilter(this, 'PENDING')">待处理</div>
      <div class="filter-chip" onclick="applyOrderFilter(this, 'FINISHED')">已完成</div>
      <div class="filter-chip" onclick="applyOrderFilter(this, 'CANCELED')">已取消</div>
    </div>

    <!-- 订单数量提示 -->
    <div id="order-count" style="padding:0 20px 8px;font-size:13px;color:#8E8E93"></div>

    <!-- 订单列表容器 -->
    <div class="order-list" id="order-list-container">
      <!-- 由JavaScript动态填充 -->
    </div>
  </div>
</div>

<!-- 引入依赖数据和逻辑文件 -->
<script src="Data/usersData.js"></script>
<script src="Data/booksData.js"></script>
<script src="Data/ordersData.js"></script>
<script src="orders.js"></script>
</body>
</html>
